
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      text-align: center;
      color: white;

      /* SFONDO IMMAGINE */
      background-image: url("sfondo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
    }

    /* overlay scuro per leggibilità */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    .container {
      margin-top: 80px;
    }

    a {
      display: block;
      margin: 15px auto;
      width: 250px;
      padding: 12px;
      background: white;
      color: #1e3c72;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
    }

    a:hover {
      background: #dbe6ff;
    }

    h1 {
      margin-bottom: 30px;
    }
  </style>
</head>

</html>
