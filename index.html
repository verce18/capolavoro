<html>
<head>
<title>STAZIONE DI RIFORNIMENTO</title>

<style>
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: linear-gradient(135deg, #1e3c72, #2a5298);
font-family: Arial, sans-serif;
}

.box {
background: white;
padding: 30px 40px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
width: 300px;
text-align: center;
}

h1 {
font-size: 20px;
margin-bottom: 20px;
color: #333;
}

input[type="text"],
input[type="password"] {
width: 100%;
padding: 10px;
margin: 8px 0;
border: 1px solid #ccc;
border-radius: 6px;
outline: none;
}

input[type="submit"] {
width: 100%;
padding: 10px;
margin-top: 10px;
background: #2a5298;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
transition: 0.2s;
}

input[type="submit"]:hover {
background: #1e3c72;
}

label {
font-size: 14px;
display: block;
text-align: left;
margin-top: 10px;
color: #444;
}
</style>
</head>

<body>

<div class="box">
<h1>INSERISCI LE CREDENZIALI</h1>

<a href="dashboard.html">
  <button>Accedi</button>
</a>
</form>
</div>

</body>
</html>
